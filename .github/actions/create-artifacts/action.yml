name: create-artifacts
description: Build Artifacts

inputs:
  os:
    description: "operating system"
    required: true
  cibw-archs:
    description: "cibuildwheel architectures to build"
    required: true

runs:
  using: "composite"
  steps:
    - name: Install Python Packages (Linux/macOS)
      if: inputs.os != 'Windows'
      shell: bash
      run: |
        uv pip install --system --upgrade build cibuildwheel twine
        rm -rf dist

    - name: Install Python Packages (Windows)
      if: inputs.os == 'Windows'
      shell: pwsh
      run: |
        uv pip install --system --upgrade build cibuildwheel twine
        if (Test-Path dist) {
          Remove-Item -Recurse -Force dist
        }

    - name: Register ARM64 binfmt
      if: inputs.cibw-archs == 'aarch64'
      shell: bash
      run: docker run --privileged --rm tonistiigi/binfmt --install arm64

    - name: Verify ARM64 manylinux container
      if: inputs.cibw-archs == 'aarch64'
      shell: bash
      run: docker run --rm --platform linux/arm64/v8 quay.io/pypa/manylinux_2_28_aarch64 uname -m

    - name: Build Sdist (Linux)
      if: inputs.os == 'Linux' && inputs.cibw-archs == 'x86_64'
      shell: bash
      run: |
        python -m build --sdist

    - name: Build Wheel (Linux/macOS)
      if: inputs.os != 'Windows'
      shell: bash
      run: python -m cibuildwheel --output-dir dist

    - name: Build Wheel (Windows)
      if: inputs.os == 'Windows'
      shell: pwsh
      run: python -m cibuildwheel --output-dir dist
