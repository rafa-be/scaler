name: Publish artifacts

on:
  release:
    types: [ created ]

permissions:
  contents: read

jobs:
  build:
    name: Build wheels (${{ matrix.os }}, ${{ matrix.cibw_archs }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            cibw_archs: x86_64
          - os: ubuntu-24.04-arm
            cibw_archs: aarch64
          - os: windows-latest
            cibw_archs: AMD64
          - os: macos-latest
            cibw_archs: native
          - os: macos-15-intel
            cibw_archs: native
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - name: 'Checkout Repository'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: ./.github/actions/setup-env
        with:
          os: ${{ runner.os }}
          python-version: '3.14'

      - uses: ./.github/actions/create-artifacts
        with:
          os: ${{ runner.os }}
          cibw-archs: ${{ matrix.cibw_archs }}
        env:
          CIBW_ARCHS: ${{ matrix.cibw_archs }}

      - name: Upload artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist-${{ matrix.os }}-${{ matrix.cibw_archs }}
          path: ./dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment: release
    permissions:
      id-token: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          path: ./dist/
          pattern: dist-*
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: ./dist/

  publish-docker:
    name: Publish Docker image to GHCR
    needs: publish
    runs-on: ${{ matrix.runner }}
    environment: release
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            platform: linux/amd64
            arch_suffix: amd64
          - runner: ubuntu-24.04-arm
            platform: linux/arm64
            arch_suffix: arm64
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - name: 'Checkout Repository'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare Docker metadata
        id: docker-metadata
        run: |
          namespace="$(printf '%s' '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          version="${GITHUB_REF_NAME#v}"
          printf 'namespace=%s\n' "${namespace}" >> "${GITHUB_OUTPUT}"
          printf 'version=%s\n' "${version}" >> "${GITHUB_OUTPUT}"

      - name: Build and push Scaler image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          tags: |
            ghcr.io/${{ steps.docker-metadata.outputs.namespace }}/scaler:${{ steps.docker-metadata.outputs.version }}-${{ matrix.arch_suffix }}
            ghcr.io/${{ steps.docker-metadata.outputs.namespace }}/scaler:latest-${{ matrix.arch_suffix }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.version=${{ steps.docker-metadata.outputs.version }}

  publish-docker-manifest:
    name: Publish Docker multi-arch manifest to GHCR
    needs: publish-docker
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: read
      packages: write
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare Docker metadata
        id: docker-metadata
        run: |
          namespace="$(printf '%s' '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          version="${GITHUB_REF_NAME#v}"
          printf 'namespace=%s\n' "${namespace}" >> "${GITHUB_OUTPUT}"
          printf 'version=%s\n' "${version}" >> "${GITHUB_OUTPUT}"

      - name: Create multi-arch image tags
        run: |
          image="ghcr.io/${{ steps.docker-metadata.outputs.namespace }}/scaler"
          version="${{ steps.docker-metadata.outputs.version }}"

          docker buildx imagetools create \
              --tag "${image}:${version}" \
              "${image}:${version}-amd64" \
              "${image}:${version}-arm64"

          docker buildx imagetools create \
              --tag "${image}:latest" \
              "${image}:latest-amd64" \
              "${image}:latest-arm64"

      - name: Make GHCR image public
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OWNER_TYPE: ${{ github.event.repository.owner.type }}
          OWNER: ${{ steps.docker-metadata.outputs.namespace }}
        run: |
          if [ "${OWNER_TYPE}" = "Organization" ]; then
              visibility_endpoint="/orgs/${OWNER}/packages/container"
          else
              visibility_endpoint="/user/packages/container"
          fi

          gh api --method PATCH "${visibility_endpoint}/scaler/visibility" -f visibility=public
