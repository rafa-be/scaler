name: "Build And Test"

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build:
    name: Build And Test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ ubuntu-latest, windows-latest, macos-latest ]

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - name: 'Checkout Repository'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: ./.github/actions/setup-env
        with:
          os: ${{ runner.os }}
          python-version: '3.10'

      - uses: ./.github/actions/run-linter
        with:
          os: ${{ runner.os }}

      - uses: ./.github/actions/3rd-party-libraries-download
        with:
          os: ${{ runner.os }}

      - uses: ./.github/actions/3rd-party-libraries-compile
        with:
          os: ${{ runner.os }}

      - uses: ./.github/actions/3rd-party-libraries-install
        with:
          os: ${{ runner.os }}

      - uses: ./.github/actions/compile-libraries
        with:
          os: ${{ runner.os }}

      - uses: ./.github/actions/validate-dependencies
        with:
          os: ${{ runner.os }}

      - uses: ./.github/actions/run-test
        with:
          os: ${{ runner.os }}

  build-wasm-client:
    name: Build WASM Client (Pyodide)
    runs-on: ubuntu-latest

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@0634a2670c59f64b4a01f0f96f84700a4088b9f0 # v2.12.0
        with:
          egress-policy: audit

      - name: 'Checkout Repository'
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: ./.github/actions/setup-wasm-env

      - uses: ./.github/actions/build-wasm-client

      - name: Upload wasm wheel
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: wasm-client-wheel
          path: ./dist_wasm/*.whl

  jupyterlite-test:
    name: JupyterLite Headless Test (Chromium)
    needs: build-wasm-client
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - name: 'Checkout Repository'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download wasm wheel artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: wasm-client-wheel
          path: ./dist_wasm/

      - uses: ./.github/actions/setup-env
        with:
          os: ${{ runner.os }}
          python-version: '3.14'

      - name: Stage wasm wheel + vendored deps under docs/source/_static/wasm
        run: |
          set -euo pipefail
          mkdir -p docs/source/_static/wasm
          # pyodide-build emits a single PEP 783 pyemscripten wheel (Pyodide 314);
          # the lite kernel's micropip installs it directly. Matched by the wasm32
          # suffix so no edit is needed on a future Pyodide/ABI bump.
          cp dist_wasm/opengris_scaler-*wasm32.whl docs/source/_static/wasm/
          python -m pip download --quiet --no-deps --dest docs/source/_static/wasm/ "cloudpickle" "tblib>=3.2.0" "opengris-parfun" "pargraph" "bidict" "pydot"
          for stub in psutil loky; do
            python -m pip wheel --quiet --no-deps \
              --wheel-dir docs/source/_static/wasm/ "scripts/wasm_stubs/${stub}"
          done
          # jupyter_lite_config.json is regenerated automatically from the
          # wheels above by docs/source/conf.py during ``make html``.

      - name: Install docs build deps + Playwright
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends pandoc
          # --override: jupyterlite-sphinx 0.22.1 caps jupyterlite-core<0.8 while
          # kernel 0.8.0 (Pyodide 314) needs core>=0.8. See docs/jupyterlite-overrides.txt.
          uv pip install --system --override docs/jupyterlite-overrides.txt -r docs/requirements_docs.txt playwright
          playwright install --with-deps chromium

      - name: Build docs (incl. JupyterLite)
        run: cd docs && make html

      - name: Run JupyterLite headless test
        env:
          RUN_JUPYTERLITE_TEST: '1'
        run: python -m unittest tests.wasm.test_jupyterlite -v
